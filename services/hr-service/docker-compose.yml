services:
  hr-service:
    build: .
    container_name: hr-service
    ports:
      - "4009:4009"
    environment:
      - PORT=4009
      - NODE_ENV=development
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-replace-with-a-strong-database-password}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-replace-with-a-strong-database-password}@db:5432/parabellum_hr?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: hr-service-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-replace-with-a-strong-database-password}
      POSTGRES_DB: parabellum_hr
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d parabellum_hr"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - hr-service_db_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: hr-service-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hr-service_db_data:
