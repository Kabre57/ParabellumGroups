services:
  analytics-service:
    build: .
    container_name: analytics-service
    ports:
      - "4011:4011"
    environment:
      - PORT=4011
      - NODE_ENV=development
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-replace-with-a-strong-database-password}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-replace-with-a-strong-database-password}@db:5432/parabellum_Analytics?schema=public
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: analytics-service-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-replace-with-a-strong-database-password}
      POSTGRES_DB: parabellum_Analytics
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d parabellum_Analytics"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - analytics-service_db_data:/var/lib/postgresql/data

volumes:
  analytics-service_db_data:
