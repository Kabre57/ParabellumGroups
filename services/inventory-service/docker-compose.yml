services:
  inventory-service:
    build: .
    container_name: inventory-service
    ports:
      - "4005:4005"
    environment:
      - PORT=4005
      - NODE_ENV=development
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-replace-with-a-strong-database-password}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-replace-with-a-strong-database-password}@db:5432/parabellum_inventory?schema=public
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: inventory-service-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-replace-with-a-strong-database-password}
      POSTGRES_DB: parabellum_inventory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d parabellum_inventory"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - inventory-service_db_data:/var/lib/postgresql/data

volumes:
  inventory-service_db_data:
