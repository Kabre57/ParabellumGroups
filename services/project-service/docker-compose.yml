services:
  project-service:
    build: .
    container_name: project-service
    ports:
      - "4006:4006"
    environment:
      - PORT=4006
      - NODE_ENV=development
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-replace-with-a-strong-database-password}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-replace-with-a-strong-database-password}@db:5432/parabellum_projects?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: project-service-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-replace-with-a-strong-database-password}
      POSTGRES_DB: parabellum_projects
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d parabellum_projects"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - project-service_db_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: project-service-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  project-service_db_data:
