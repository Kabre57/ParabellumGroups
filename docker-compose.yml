services:
  # ==================== INFRASTRUCTURE ====================
  postgres:
    image: postgres:15-alpine
    container_name: parabellum-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_MULTIPLE_DATABASES: >
        parabellum_auth,
        parabellum_communication,
        parabellum_technical,
        parabellum_commercial,
        parabellum_inventory,
        parabellum_projects,
        parabellum_procurement,
        parabellum_customers,
        parabellum_hr,
        parabellum_billing,
        parabellum_Analytics,
        parabellum_notification
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: parabellum-redis
    restart: always
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    ports:
      - "127.0.0.1:16379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?REDIS_PASSWORD is required} ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: parabellum-minio
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: parabellum-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required} &&
      mc mb -p local/rapport-photos || true &&
      mc anonymous set download local/rapport-photos &&
      exit 0;
      "

  # ==================== FRONTEND ====================
  frontend:
    build: ./frontend
    container_name: parabellum-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - api-gateway

  nginx:
    image: nginx:alpine
    container_name: parabellum-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx-parabellum.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
        restart: true
      api-gateway:
        condition: service_started
        restart: true

  # ==================== API GATEWAY ====================
  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET}
      # URLs des services (utilise les noms Docker)
      - AUTH_SERVICE_URL=http://auth-service:4001
      - COMMUNICATION_SERVICE_URL=http://communication-service:4002
      - TECHNICAL_SERVICE_URL=http://technical-service:4003
      - COMMERCIAL_SERVICE_URL=http://commercial-service:4004
      - INVENTORY_SERVICE_URL=http://inventory-service:4005
      - PROJECTS_SERVICE_URL=http://project-service:4006
      - PROCUREMENT_SERVICE_URL=http://procurement-service:4007
      - CUSTOMERS_SERVICE_URL=http://customer-service:4008
      - HR_SERVICE_URL=http://hr-service:4009
      - BILLING_SERVICE_URL=http://billing-service:4010
      - ANALYTICS_SERVICE_URL=http://analytics-service:4011
      - NOTIFICATIONS_SERVICE_URL=http://notification-service:4012
    depends_on:
      - auth-service
      - communication-service
      - technical-service
      - commercial-service
      - inventory-service
      - project-service
      - procurement-service
      - customer-service
      - hr-service
      - billing-service
      - analytics-service
      - notification-service

  # ==================== MICROSERVICES ====================
  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/parabellum_auth?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM:-admin@parabellum-erp.online}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_PUBLIC_ENDPOINT=${S3_PUBLIC_ENDPOINT}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  communication-service:
    build: ./services/communication-service
    container_name: communication-service
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/parabellum_communication?schema=public
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM:-admin@parabellum-erp.online}
    depends_on:
      postgres:
        condition: service_healthy

  technical-service:
    build: ./services/technical-service
    container_name: technical-service
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/parabellum_technical?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      - MINIO_BUCKET=rapport-photos
      - MINIO_PUBLIC_URL=http://localhost:9000
      - MINIO_INTERNAL_URL=http://minio:9000
      - MINIO_USE_SSL=false
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - REPORT_LOGO_URL=http://frontend:3000/parabellum.jpg
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  commercial-service:
    build: ./services/commercial-service
    container_name: commercial-service
    ports:
      - "4004:4004"
    environment:
      - PORT=4004
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/parabellum_commercial?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  inventory-service:
    build: ./services/inventory-service
    container_name: inventory-service
    ports:
      - "4005:4005"
    environment:
      - PORT=4005
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/parabellum_inventory?schema=public
      - AUTH_SERVICE_URL=http://auth-service:4001
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  project-service:
    build: ./services/project-service
    container_name: project-service
    ports:
      - "4006:4006"
    environment:
      - PORT=4006
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/parabellum_projects?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  procurement-service:
    build: ./services/procurement-service
    container_name: procurement-service
    ports:
      - "4007:4007"
    environment:
      - PORT=4007
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/parabellum_procurement?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  customer-service:
    build: ./services/customer-service
    container_name: customer-service
    ports:
      - "4008:4008"
    environment:
      - PORT=4008
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/parabellum_customers?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  hr-service:
    build: ./services/hr-service
    container_name: hr-service
    ports:
      - "4009:4009"
    environment:
      - PORT=4009
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/parabellum_hr?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM:-admin@parabellum-erp.online}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  billing-service:
    build: ./services/billing-service
    container_name: billing-service
    ports:
      - "4010:4010"
    environment:
      - PORT=4010
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/parabellum_billing?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      - PROJECTS_SERVICE_URL=http://project-service:4006
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics-service:
    build: ./services/analytics-service
    container_name: analytics-service
    ports:
      - "4011:4011"
    environment:
      - PORT=4011
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/parabellum_Analytics?schema=public
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    ports:
      - "4012:4012"
    environment:
      - PORT=4012
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/parabellum_notification?schema=public
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
