version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: parabellum-db
    restart: always
    command: ["postgres", "-c", "max_connections=500"]
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_MULTIPLE_DATABASES: >
        parabellum_auth,
        parabellum_communication,
        parabellum_technical,
        parabellum_commercial,
        parabellum_inventory,
        parabellum_projects,
        parabellum_procurement,
        parabellum_customers,
        parabellum_hr,
        parabellum_billing,
        parabellum_Analytics,
        parabellum_notification
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: parabellum-redis
    restart: always
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    ports:
      - "127.0.0.1:16379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?REDIS_PASSWORD is required} ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: parabellum-minio
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data

  minio-init:
    image: alpine:latest
    container_name: parabellum-minio-init
    depends_on:
      minio:
        condition: service_started
    command: ["sh", "-c", "echo 'MinIO init skipped due to network issues' && exit 0"]

  api-gateway:
    image: parabellumgroups-api-gateway:latest
    container_name: api-gateway
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:4001
      - COMMUNICATION_SERVICE_URL=http://communication-service:4002
      - TECHNICAL_SERVICE_URL=http://technical-service:4003
      - COMMERCIAL_SERVICE_URL=http://commercial-service:4004
      - INVENTORY_SERVICE_URL=http://inventory-service:4005
      - PROJECTS_SERVICE_URL=http://project-service:4006
      - PROCUREMENT_SERVICE_URL=http://procurement-service:4007
      - CUSTOMERS_SERVICE_URL=http://customer-service:4008
      - HR_SERVICE_URL=http://hr-service:4009
      - BILLING_SERVICE_URL=http://billing-service:4010
      - ANALYTICS_SERVICE_URL=http://analytics-service:4011
      - NOTIFICATIONS_SERVICE_URL=http://notification-service:4012

  auth-service:
    image: parabellumgroups-auth-service:latest
    container_name: auth-service
    restart: always
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/parabellum_auth?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM:-admin@parabellum-erp.online}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_PUBLIC_ENDPOINT=${S3_PUBLIC_ENDPOINT}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}

volumes:
  postgres_data:
  minio_data:
